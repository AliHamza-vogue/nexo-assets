<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO 4 ERP | Secure Access</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: '#40828d',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains+Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0b0e; color: white; overflow-x: hidden; }
        .bg-grid { background-image: radial-gradient(rgba(64, 130, 141, 0.1) 1px, transparent 1px); background-size: 40px 40px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // Helper Component: Icon
        const Icon = ({ name, className }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // Helper Component: FeatureCard
        const FeatureCard = ({ iconName, title, desc }) => (
            <div className="flex items-start gap-4 p-5 rounded-2xl bg-white/5 border border-white/10 backdrop-blur-sm hover:bg-white/10 transition-colors group">
                <div className="p-2.5 rounded-lg bg-accent/10 text-accent group-hover:bg-accent group-hover:text-white transition-all">
                    <Icon name={iconName} className="w-5 h-5" />
                </div>
                <div>
                    <h4 className="text-sm font-bold text-white mb-1">{title}</h4>
                    <p className="text-xs text-gray-400 leading-relaxed">{desc}</p>
                </div>
            </div>
        );

        function App() {
            // State Logic
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [status, setStatus] = useState('idle'); // idle, loading, success, error
            const [errorMessage, setErrorMessage] = useState('');

            const isLoading = status === 'loading';

            const handleSubmit = async (e) => {
                e.preventDefault();
                setStatus('loading');
                setErrorMessage('');

                try {
                    // Frappe standard login endpoint
                    const response = await fetch('/api/method/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({
                            usr: email,
                            pwd: password
                        })
                    });

                    const data = await response.json();

                    if (response.ok && data.message === "Logged In") {
                        setStatus('success');
                        // Smooth transition to desk
                        setTimeout(() => {
                            window.location.href = '/app';
                        }, 1500);
                    } else {
                        throw new Error(data.message || "Authentication Failed");
                    }
                } catch (err) {
                    setStatus('error');
                    setErrorMessage(err.message === "Invalid Login Credentials" ? "The credentials provided do not match our records." : err.message);
                }
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row font-sans">
                    {/* Left Side: Branding & Features */}
                    <div className="hidden md:flex w-1/2 lg:w-[60%] bg-[#0a0b0e] relative p-12 lg:p-24 flex-col justify-between overflow-hidden border-r border-white/5">
                        <div className="absolute top-0 left-0 w-full h-full bg-grid opacity-50"></div>
                        <div className="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-accent/10 blur-[120px] rounded-full"></div>
                        
                        <motion.div 
                            initial={{ opacity: 0, x: -20 }}
                            animate={{ opacity: 1, x: 0 }}
                            className="relative z-10"
                        >
                            <div className="flex items-center gap-3 mb-12">
                                <div className="w-10 h-10 bg-accent rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(64,130,141,0.5)]">
                                    <Icon name="command" className="text-[#0a0b0e] w-6 h-6" />
                                </div>
                                <span className="text-2xl font-bold tracking-tighter">NEXO 4 <span className="text-accent">ERP</span></span>
                            </div>

                            <div className="max-w-md">
                                <motion.h1 
                                    initial={{ opacity: 0, y: 20 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    transition={{ delay: 0.2 }}
                                    className="text-5xl lg:text-6xl font-bold leading-[1.1] mb-6"
                                >
                                    Autonomous <br/>Enterprise <br/><span className="text-accent italic">Intelligence.</span>
                                </motion.h1>
                                <motion.p 
                                    initial={{ opacity: 0 }}
                                    animate={{ opacity: 1 }}
                                    transition={{ delay: 0.4 }}
                                    className="text-gray-400 text-lg mb-12 font-light leading-relaxed"
                                >
                                    The next generation of resource planning. Built for speed, scale, and architectural excellence.
                                </motion.p>

                                <motion.div 
                                    initial={{ opacity: 0, y: 20 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    transition={{ delay: 0.5 }}
                                    className="grid grid-cols-1 gap-4"
                                >
                                    <FeatureCard 
                                        iconName="globe" 
                                        title="Global Logistics" 
                                        desc="End-to-end supply chain visibility."
                                    />
                                    <FeatureCard 
                                        iconName="shield-check" 
                                        title="Secure Infrastructure" 
                                        desc="Enterprise-grade security standards."
                                    />
                                </motion.div>
                            </div>
                        </motion.div>

                        <motion.div 
                            initial={{ opacity: 0 }}
                            animate={{ opacity: 1 }}
                            transition={{ duration: 0.8, delay: 0.6 }}
                            className="hidden md:block relative z-10"
                        >
                            <motion.p 
                                animate={{ color: ["#6b7280", "#40828d", "#6b7280"] }}
                                transition={{ duration: 8, repeat: Infinity, ease: "easeInOut" }}
                                className="text-sm font-mono"
                            >
                                © 2026 NEXO CLOUD. ALL RIGHTS RESERVED.
                            </motion.p>
                        </motion.div>
                    </div>

                    {/* Right Side: Login Form */}
                    <div className="w-full md:w-1/2 lg:w-[40%] flex items-center justify-center p-8 md:p-16 bg-[#0f1115] relative">
                        <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={{ backgroundImage: 'radial-gradient(#40828d 1px, transparent 1px)', backgroundSize: '30px 30px' }}></div>
                        
                        <motion.div 
                            initial={{ opacity: 0, scale: 0.95 }}
                            animate={{ opacity: 1, scale: 1 }}
                            transition={{ duration: 0.5 }}
                            className="w-full max-w-sm z-10"
                        >
                            <div className="mb-10">
                                <h3 className="text-3xl font-bold mb-2">Welcome back</h3>
                                <p className="text-gray-400 text-sm">Please authenticate to access the ERP portal.</p>
                            </div>

                            <form className="space-y-6" onSubmit={handleSubmit}>
                                <div className="space-y-5">
                                    <div className="space-y-2">
                                        <label htmlFor="login_email" className="text-xs font-semibold text-gray-400 uppercase tracking-wider ml-1">Username / Email</label>
                                        <div className="relative group">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                                <Icon name="mail" className="h-4 w-4 text-gray-500 group-focus-within:text-accent transition-colors" />
                                            </div>
                                            <input
                                                type="text"
                                                id="login_email"
                                                className="block w-full pl-11 pr-4 py-3.5 bg-[#16191e] border border-[#2d323b] rounded-xl text-sm text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent/50 transition-all"
                                                placeholder="abc@nexo4erp.com"
                                                required
                                                autoFocus
                                                value={email}
                                                onChange={(e) => setEmail(e.target.value)}
                                            />
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        <div className="flex justify-between items-center px-1">
                                            <label htmlFor="login_password" className="text-xs font-semibold text-gray-400 uppercase tracking-wider">Password</label>
                                            <a href="#" className="text-[10px] text-accent hover:text-accent/80 font-bold uppercase tracking-tighter transition-colors">Forgot password?</a>
                                        </div>
                                        <div className="relative group">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                                <Icon name="lock" className="h-4 w-4 text-gray-500 group-focus-within:text-accent transition-colors" />
                                            </div>
                                            <input
                                                type={showPassword ? "text" : "password"}
                                                id="login_password"
                                                className="block w-full pl-11 pr-12 py-3.5 bg-[#16191e] border border-[#2d323b] rounded-xl text-sm text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent/50 transition-all"
                                                placeholder="••••••••••••"
                                                required
                                                value={password}
                                                onChange={(e) => setPassword(e.target.value)}
                                            />
                                            <button
                                                type="button"
                                                onClick={() => setShowPassword(!showPassword)}
                                                className="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-accent transition-colors"
                                            >
                                                <Icon name={showPassword ? "eye-off" : "eye"} className="h-4 w-4" />
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex items-center gap-3 px-1">
                                    <input 
                                        type="checkbox" 
                                        id="remember"
                                        className="w-4 h-4 rounded border-[#3b424e] bg-[#16191e] accent-accent focus:ring-0 focus:ring-offset-0 cursor-pointer" 
                                    />
                                    <label htmlFor="remember" className="text-sm text-gray-400 cursor-pointer select-none hover:text-gray-300 transition-colors">Remember this session</label>
                                </div>

                                <AnimatePresence>
                                    {status === 'error' && (
                                        <motion.div
                                            initial={{ opacity: 0, y: -10 }}
                                            animate={{ opacity: 1, y: 0 }}
                                            exit={{ opacity: 0, y: -10 }}
                                            className="bg-red-500/10 border border-red-500/20 rounded-xl p-4 flex items-start gap-3"
                                        >
                                            <Icon name="alert-circle" className="w-5 h-5 text-red-500 shrink-0 mt-0.5" />
                                            <div className="space-y-1">
                                                <p className="text-xs font-bold text-red-500 uppercase tracking-wider">Access Denied</p>
                                                <p className="text-xs text-red-400/80 leading-relaxed">{errorMessage}</p>
                                            </div>
                                        </motion.div>
                                    )}
                                    {status === 'success' && (
                                        <motion.div
                                            initial={{ opacity: 0, y: -10 }}
                                            animate={{ opacity: 1, y: 0 }}
                                            className="bg-accent/10 border border-accent/20 rounded-xl p-4 flex items-start gap-3"
                                        >
                                            <Icon name="shield-check" className="w-5 h-5 text-accent shrink-0 mt-0.5" />
                                            <div className="space-y-1">
                                                <p className="text-xs font-bold text-accent uppercase tracking-wider">Access Granted</p>
                                                <p className="text-xs text-accent/80 leading-relaxed">Authentication successful. Redirecting to secure terminal...</p>
                                            </div>
                                        </motion.div>
                                    )}
                                </AnimatePresence>

                                <button
                                    type="submit"
                                    disabled={isLoading || status === 'success'}
                                    className="w-full relative group rounded-xl transition-all duration-300 hover:shadow-[0_0_20px_rgba(64,130,141,0.4)]"
                                >
                                    <div className={`absolute inset-0 bg-accent rounded-xl transition-transform duration-300 group-hover:scale-[1.02] ${isLoading ? 'opacity-50' : ''}`}></div>
                                    <div className="relative flex items-center justify-center gap-2 py-4 px-6 text-sm font-bold text-[#0a0b0e] uppercase tracking-widest">
                                        {isLoading ? (
                                            <>
                                                <motion.div 
                                                    animate={{ rotate: 360 }}
                                                    transition={{ duration: 1, repeat: Infinity, ease: "linear" }}
                                                >
                                                    <Icon name="cpu" className="w-5 h-5" />
                                                </motion.div>
                                                <span>Authenticating...</span>
                                            </>
                                        ) : status === 'success' ? (
                                            <>
                                                <Icon name="shield-check" className="w-5 h-5" />
                                                <span>Access Granted</span>
                                            </>
                                        ) : (
                                            <>
                                                <span>Login to ERP</span>
                                                <Icon name="arrow-right" className="w-5 h-5 group-hover:translate-x-1 transition-transform" />
                                            </>
                                        )}
                                    </div>
                                </button>
                            </form>

                            <div className="mt-12 pt-8 border-t border-[#2d323b] flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    <div className="relative w-12 h-6 overflow-hidden bg-[#16191e]/50 rounded-md border border-[#2d323b]">
                                        <svg viewBox="0 0 100 40" className="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                                            <line x1="0" y1="20" x2="100" y2="20" stroke="#2d323b" strokeWidth="0.5" />
                                            <motion.path
                                                d="M 0 20 L 35 20 L 40 18 L 45 5 L 52 35 L 57 20 L 100 20"
                                                fill="none"
                                                stroke={status === 'error' ? '#ef4444' : status === 'success' ? '#40828d' : '#22c55e'}
                                                strokeWidth="2"
                                                initial={{ pathLength: 0, pathOffset: 1 }}
                                                animate={{ pathLength: [0, 1, 1], pathOffset: [1, 0, -1] }}
                                                transition={{ duration: status === 'loading' ? 1 : 3, repeat: Infinity, ease: "linear" }}
                                            />
                                        </svg>
                                    </div>
                                    <AnimatePresence mode="wait">
                                        <motion.span 
                                            key={status}
                                            initial={{ opacity: 0, x: -5 }}
                                            animate={{ opacity: 1, x: 0 }}
                                            className="text-[10px] font-mono text-gray-500 uppercase tracking-widest"
                                        >
                                            {status === 'loading' ? 'Verifying Node...' : 
                                             status === 'error' ? 'Handshake Failed' :
                                             status === 'success' ? 'Session Established' :
                                             'System Operational'}
                                        </motion.span>
                                    </AnimatePresence>
                                </div>
                                <div className="flex items-center gap-1">
                                    <span className="text-[10px] text-gray-600 uppercase">Powered by</span>
                                    <span className="text-[10px] font-bold">NEXO 4 ERP</span>
                                </div>
                            </div>
                        </motion.div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
