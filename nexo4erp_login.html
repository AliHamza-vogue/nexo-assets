<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO 4 ERP | Core Intelligence</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { accent: '#40828d' },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains+Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0b0e; color: white; overflow: hidden; }
        .bg-hero { 
            background-image: linear-gradient(to right, rgba(10, 11, 14, 0.9), rgba(10, 11, 14, 0.6)), 
                              url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
        }
        .bg-grid { background-image: radial-gradient(rgba(64, 130, 141, 0.1) 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = Motion;

        const Icon = ({ name, className }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const FeatureCard = ({ iconName, title, desc }) => (
            <div className="flex items-center justify-between w-full p-4 rounded-xl bg-white/5 border border-white/10 backdrop-blur-md hover:bg-white/10 transition-all cursor-pointer group">
                <div className="flex items-center gap-4">
                    <div className="p-2 rounded-lg bg-white/5 text-gray-400 group-hover:text-accent transition-colors">
                        <Icon name={iconName} className="w-5 h-5" />
                    </div>
                    <div>
                        <h4 className="text-sm font-bold text-white tracking-tight">{title}</h4>
                        <p className="text-[11px] text-gray-500">{desc}</p>
                    </div>
                </div>
                <Icon name="chevron-right" className="w-4 h-4 text-gray-600 group-hover:text-accent" />
            </div>
        );

        function App() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [status, setStatus] = useState('idle'); 
            const [errorMessage, setErrorMessage] = useState('');

            const getCookie = (name) => {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setStatus('loading');
                try {
                    const response = await fetch('/api/method/login', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'X-Frappe-CSRF-Token': getCookie('sid') || ""
                        },
                        body: JSON.stringify({ usr: email, pwd: password })
                    });
                    const data = await response.json();
                    if (response.ok && data.message === "Logged In") {
                        setStatus('success');
                        setTimeout(() => { window.location.href = '/app'; }, 1000);
                    } else {
                        throw new Error(data.message || "Invalid Login Credentials");
                    }
                } catch (err) {
                    setStatus('error');
                    setErrorMessage(err.message);
                }
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row font-sans">
                    {/* LEFT SECTION */}
                    <div className="hidden md:flex w-full md:w-[60%] bg-hero relative p-12 lg:p-20 flex-col justify-between overflow-hidden">
                        <div className="absolute inset-0 bg-grid opacity-40"></div>
                        
                        <div className="relative z-10">
                            <div className="flex items-center gap-3 mb-16">
                                <div className="w-10 h-10 bg-accent/20 border border-accent/30 rounded-lg flex items-center justify-center">
                                    <Icon name="activity" className="text-accent w-6 h-6" />
                                </div>
                                <div>
                                    <span className="text-xl font-bold tracking-tighter block leading-none">NEXO 4 <span className="text-accent">ERP</span></span>
                                    <span className="text-[9px] uppercase tracking-[0.3em] text-gray-500 font-bold">Enterprise Intelligence</span>
                                </div>
                            </div>

                            <div className="max-w-xl">
                                <h1 className="text-6xl lg:text-7xl font-bold leading-[0.9] mb-4 tracking-tighter">
                                    THE CORE OF <br/>YOUR <span className="text-accent">EMPIRE</span>
                                </h1>
                                <p className="text-gray-400 text-lg mb-12 font-medium tracking-tight">
                                    Beyond Transactions. <span className="text-white">Pure Intelligence.</span>
                                </p>

                                <div className="space-y-3 w-full max-w-sm">
                                    <FeatureCard iconName="bar-chart-3" title="Real-time Analytics" desc="Live downstream production data and insights." />
                                    <FeatureCard iconName="globe" title="Global Logistics" desc="End-to-end supply chain visibility." />
                                    <FeatureCard iconName="shield-check" title="Secure Infrastructure" desc="Enterprise-grade security standards." />
                                </div>
                            </div>
                        </div>

                        <div className="relative z-10">
                            <p className="text-[10px] font-mono text-gray-600 uppercase tracking-widest">
                                © 2026 NEXO CLOUD. ALL RIGHTS RESERVED.
                            </p>
                        </div>
                    </div>

                    {/* RIGHT SECTION */}
                    <div className="w-full md:w-[40%] flex items-center justify-center p-8 bg-[#0a0b0e] border-l border-white/5 relative">
                        <div className="w-full max-w-sm">
                            <div className="mb-10">
                                <h3 className="text-4xl font-bold mb-3 tracking-tight">Welcome back</h3>
                                <p className="text-gray-500 text-sm">Please authenticate to access the ERP portal.</p>
                            </div>

                            <form className="space-y-6" onSubmit={handleSubmit}>
                                <div className="space-y-4">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] ml-1">Username / Email</label>
                                        <div className="relative group">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                                <Icon name="mail" className="h-4 w-4 text-gray-600 group-focus-within:text-accent transition-colors" />
                                            </div>
                                            <input
                                                type="text"
                                                className="block w-full pl-11 pr-4 py-4 bg-[#111318] border border-white/5 rounded-xl text-sm focus:outline-none focus:border-accent/50 focus:ring-1 focus:ring-accent/20 transition-all placeholder:text-gray-700"
                                                placeholder="abc@nexo4erp.com"
                                                required
                                                value={email}
                                                onChange={(e) => setEmail(e.target.value)}
                                            />
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        <div className="flex justify-between items-center px-1">
                                            <label className="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em]">Password</label>
                                            <a href="#" className="text-[9px] text-gray-500 hover:text-accent font-bold uppercase tracking-widest">Forgot Password?</a>
                                        </div>
                                        <div className="relative group">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                                <Icon name="lock" className="h-4 w-4 text-gray-600 group-focus-within:text-accent transition-colors" />
                                            </div>
                                            <input
                                                type={showPassword ? "text" : "password"}
                                                className="block w-full pl-11 pr-12 py-4 bg-[#111318] border border-white/5 rounded-xl text-sm focus:outline-none focus:border-accent/50 focus:ring-1 focus:ring-accent/20 transition-all placeholder:text-gray-700"
                                                placeholder="••••••••••••"
                                                required
                                                value={password}
                                                onChange={(e) => setPassword(e.target.value)}
                                            />
                                            <button
                                                type="button"
                                                onClick={() => setShowPassword(!showPassword)}
                                                className="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-600 hover:text-accent transition-colors"
                                            >
                                                <Icon name={showPassword ? "eye-off" : "eye"} className="h-4 w-4" />
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex items-center gap-3 px-1">
                                    <input type="checkbox" id="rem" className="w-4 h-4 rounded border-white/10 bg-white/5 accent-accent" />
                                    <label htmlFor="rem" className="text-xs text-gray-500">Remember this session</label>
                                </div>

                                <AnimatePresence>
                                    {status === 'error' && (
                                        <motion.div initial={{ opacity: 0, y: -5 }} animate={{ opacity: 1, y: 0 }} className="p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-[11px] text-red-400 flex items-center gap-2">
                                            <Icon name="alert-circle" className="w-4 h-4" /> {errorMessage}
                                        </motion.div>
                                    )}
                                </AnimatePresence>

                                <button
                                    type="submit"
                                    disabled={status === 'loading' || status === 'success'}
                                    className="w-full relative py-4 bg-accent text-[#0a0b0e] text-xs font-bold uppercase tracking-[0.2em] rounded-xl hover:brightness-110 transition-all active:scale-[0.98] disabled:opacity-50"
                                >
                                    <div className="flex items-center justify-center gap-2">
                                        {status === 'loading' ? 'Authenticating...' : status === 'success' ? 'Access Granted' : 'Login to ERP'}
                                        <Icon name="arrow-right" className="w-4 h-4" />
                                    </div>
                                </button>
                            </form>

                            <div className="mt-20 pt-8 border-t border-white/5 flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-12 h-6 bg-black/40 rounded border border-white/5 relative overflow-hidden flex items-center">
                                        <svg viewBox="0 0 100 40" className="w-full h-full">
                                            <motion.path
                                                d="M 0 20 L 30 20 L 35 10 L 45 30 L 50 20 L 100 20"
                                                fill="none"
                                                stroke="#22c55e"
                                                strokeWidth="2"
                                                animate={{ pathLength: [0, 1], pathOffset: [1, 0] }}
                                                transition={{ duration: 2, repeat: Infinity, ease: "linear" }}
                                            />
                                        </svg>
                                    </div>
                                    <span className="text-[10px] font-mono text-gray-600 uppercase tracking-widest">System Operational</span>
                                </div>
                                <span className="text-[9px] text-gray-700 font-bold uppercase tracking-widest">Powered by <span className="text-gray-500">Nexo 4 ERP</span></span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
