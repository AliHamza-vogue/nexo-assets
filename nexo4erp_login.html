<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO 4 ERP | Secure Access</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { accent: '#40828d' },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains+Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0b0e; color: white; overflow-x: hidden; }
        .bg-grid { background-image: radial-gradient(rgba(64, 130, 141, 0.1) 1px, transparent 1px); background-size: 40px 40px; }
        /* Hide scrollbar for cleaner UI */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        // FIX: CDN version exports to 'Motion', not 'FramerMotion'
        const { motion, AnimatePresence } = Motion;

        // Helper: Icon Component
        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // Helper: Feature Card
        const FeatureCard = ({ iconName, title, desc }) => (
            <div className="flex items-start gap-4 p-5 rounded-2xl bg-white/5 border border-white/10 backdrop-blur-sm hover:bg-white/10 transition-colors group">
                <div className="p-2.5 rounded-lg bg-accent/10 text-accent group-hover:bg-accent group-hover:text-white transition-all">
                    <Icon name={iconName} className="w-5 h-5" />
                </div>
                <div>
                    <h4 className="text-sm font-bold text-white mb-1">{title}</h4>
                    <p className="text-xs text-gray-400 leading-relaxed">{desc}</p>
                </div>
            </div>
        );

        function App() {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [status, setStatus] = useState('idle'); 
            const [errorMessage, setErrorMessage] = useState('');

            const isLoading = status === 'loading';

            // Helper to get Frappe CSRF Token from cookies
            const getCookie = (name) => {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setStatus('loading');
                setErrorMessage('');

                try {
                    // Standard Frappe login endpoint
                    const response = await fetch('/api/method/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json',
                            // Some ERPNext setups require the CSRF token even for login
                            'X-Frappe-CSRF-Token': getCookie('sid') || "" 
                        },
                        body: JSON.stringify({
                            usr: email,
                            pwd: password
                        })
                    });

                    const data = await response.json();

                    if (response.ok && data.message === "Logged In") {
                        setStatus('success');
                        // Small delay for the "Access Granted" animation
                        setTimeout(() => {
                            window.location.href = '/app';
                        }, 1200);
                    } else {
                        // Handle Frappe's specific error messages
                        const msg = data.message || "Invalid Login Credentials";
                        throw new Error(msg);
                    }
                } catch (err) {
                    setStatus('error');
                    setErrorMessage(err.message);
                    console.error("Login Error:", err);
                }
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row font-sans">
                    {/* LEFT SIDE: Branding */}
                    <div className="hidden md:flex w-1/2 lg:w-[60%] bg-[#0a0b0e] relative p-12 lg:p-24 flex-col justify-between overflow-hidden border-r border-white/5">
                        <div className="absolute top-0 left-0 w-full h-full bg-grid opacity-50"></div>
                        <div className="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-accent/10 blur-[120px] rounded-full"></div>
                        
                        <div className="relative z-10">
                            <div className="flex items-center gap-3 mb-12">
                                <div className="w-10 h-10 bg-accent rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(64,130,141,0.5)]">
                                    <Icon name="command" className="text-[#0a0b0e] w-6 h-6" />
                                </div>
                                <span className="text-2xl font-bold tracking-tighter uppercase">Nexo 4 <span className="text-accent">ERP</span></span>
                            </div>

                            <div className="max-w-md">
                                <h1 className="text-5xl lg:text-6xl font-bold leading-[1.1] mb-6">
                                    Autonomous <br/>Enterprise <br/><span className="text-accent italic">Intelligence.</span>
                                </h1>
                                <p className="text-gray-400 text-lg mb-12 font-light leading-relaxed">
                                    The next generation of resource planning. Built for speed, scale, and architectural excellence.
                                </p>

                                <div className="grid grid-cols-1 gap-4">
                                    <FeatureCard 
                                        iconName="globe" 
                                        title="Global Logistics" 
                                        desc="End-to-end supply chain visibility and automated routing."
                                    />
                                    <FeatureCard 
                                        iconName="shield-check" 
                                        title="Secure Infrastructure" 
                                        desc="Enterprise-grade security standards with encrypted data layers."
                                    />
                                </div>
                            </div>
                        </div>

                        <div className="relative z-10">
                            <p className="text-sm font-mono text-gray-500 uppercase tracking-widest">
                                © 2026 NEXO CLOUD SYSTEMS
                            </p>
                        </div>
                    </div>

                    {/* RIGHT SIDE: Form */}
                    <div className="w-full md:w-1/2 lg:w-[40%] flex items-center justify-center p-8 md:p-16 bg-[#0f1115] relative">
                        <div className="absolute inset-0 opacity-[0.03] pointer-events-none" style={{ backgroundImage: 'radial-gradient(#40828d 1px, transparent 1px)', backgroundSize: '30px 30px' }}></div>
                        
                        <div className="w-full max-w-sm z-10">
                            <div className="mb-10">
                                <h3 className="text-3xl font-bold mb-2">Welcome back</h3>
                                <p className="text-gray-400 text-sm">Authenticate to access your secure terminal.</p>
                            </div>

                            <form className="space-y-6" onSubmit={handleSubmit}>
                                <div className="space-y-5">
                                    <div className="space-y-2">
                                        <label className="text-xs font-semibold text-gray-400 uppercase tracking-wider ml-1">Username / Email</label>
                                        <div className="relative group">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                                <Icon name="mail" className="h-4 w-4 text-gray-500 group-focus-within:text-accent transition-colors" />
                                            </div>
                                            <input
                                                type="text"
                                                className="block w-full pl-11 pr-4 py-3.5 bg-[#16191e] border border-[#2d323b] rounded-xl text-sm text-white focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent/50 transition-all"
                                                placeholder="user@nexo4.cloud"
                                                required
                                                value={email}
                                                onChange={(e) => setEmail(e.target.value)}
                                            />
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        <div className="flex justify-between items-center px-1">
                                            <label className="text-xs font-semibold text-gray-400 uppercase tracking-wider">Password</label>
                                            <a href="#" className="text-[10px] text-accent font-bold uppercase tracking-tighter">Forgot?</a>
                                        </div>
                                        <div className="relative group">
                                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                                <Icon name="lock" className="h-4 w-4 text-gray-500 group-focus-within:text-accent transition-colors" />
                                            </div>
                                            <input
                                                type={showPassword ? "text" : "password"}
                                                className="block w-full pl-11 pr-12 py-3.5 bg-[#16191e] border border-[#2d323b] rounded-xl text-sm text-white focus:outline-none focus:ring-2 focus:ring-accent/20 focus:border-accent/50 transition-all"
                                                placeholder="••••••••••••"
                                                required
                                                value={password}
                                                onChange={(e) => setPassword(e.target.value)}
                                            />
                                            <button
                                                type="button"
                                                onClick={() => setShowPassword(!showPassword)}
                                                className="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-accent"
                                            >
                                                <Icon name={showPassword ? "eye-off" : "eye"} className="h-4 w-4" />
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <AnimatePresence>
                                    {status === 'error' && (
                                        <motion.div
                                            initial={{ opacity: 0, y: -10 }}
                                            animate={{ opacity: 1, y: 0 }}
                                            exit={{ opacity: 0, y: -10 }}
                                            className="bg-red-500/10 border border-red-500/20 rounded-xl p-4 flex items-start gap-3"
                                        >
                                            <Icon name="alert-circle" className="w-5 h-5 text-red-500 shrink-0 mt-0.5" />
                                            <div className="space-y-1">
                                                <p className="text-xs font-bold text-red-500 uppercase tracking-wider">Access Denied</p>
                                                <p className="text-xs text-red-400/80 leading-relaxed">{errorMessage}</p>
                                            </div>
                                        </motion.div>
                                    )}
                                    {status === 'success' && (
                                        <motion.div
                                            initial={{ opacity: 0, y: -10 }}
                                            animate={{ opacity: 1, y: 0 }}
                                            className="bg-accent/10 border border-accent/20 rounded-xl p-4 flex items-start gap-3"
                                        >
                                            <Icon name="shield-check" className="w-5 h-5 text-accent shrink-0 mt-0.5" />
                                            <div className="space-y-1">
                                                <p className="text-xs font-bold text-accent uppercase tracking-wider">Access Granted</p>
                                                <p className="text-xs text-accent/80 leading-relaxed">Session secure. Redirecting...</p>
                                            </div>
                                        </motion.div>
                                    )}
                                </AnimatePresence>

                                <button
                                    type="submit"
                                    disabled={isLoading || status === 'success'}
                                    className="w-full relative group rounded-xl py-4 bg-accent text-[#0a0b0e] text-sm font-bold uppercase tracking-widest transition-all hover:shadow-[0_0_20px_rgba(64,130,141,0.4)] active:scale-95 disabled:opacity-50"
                                >
                                    <div className="flex items-center justify-center gap-2">
                                        {isLoading ? (
                                            <motion.div animate={{ rotate: 360 }} transition={{ repeat: Infinity, duration: 1 }}>
                                                <Icon name="cpu" className="w-5 h-5" />
                                            </motion.div>
                                        ) : (
                                            <>
                                                <span>Login to Portal</span>
                                                <Icon name="arrow-right" className="w-4 h-4" />
                                            </>
                                        )}
                                    </div>
                                </button>
                            </form>

                            <div className="mt-12 pt-8 border-t border-[#2d323b] flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-5 bg-[#16191e] rounded border border-[#2d323b] relative overflow-hidden">
                                        <svg viewBox="0 0 100 40" className="absolute inset-0 w-full h-full">
                                            <motion.path
                                                d="M 0 20 L 30 20 L 35 10 L 45 30 L 50 20 L 100 20"
                                                fill="none"
                                                stroke={status === 'error' ? '#ef4444' : '#40828d'}
                                                strokeWidth="2"
                                                animate={{ pathLength: [0, 1], pathOffset: [1, 0] }}
                                                transition={{ duration: 2, repeat: Infinity, ease: "linear" }}
                                            />
                                        </svg>
                                    </div>
                                    <span className="text-[10px] font-mono text-gray-500 uppercase tracking-[0.2em]">
                                        {status === 'loading' ? 'Verifying...' : 'System Online'}
                                    </span>
                                </div>
                                <span className="text-[10px] font-bold text-gray-600">v4.2.0</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
